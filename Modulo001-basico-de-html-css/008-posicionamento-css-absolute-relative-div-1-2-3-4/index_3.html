<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos Semânticos Lado a Lado</title>

    <style>
        * {
            padding: 0;
            margin: 0;
        }
        .div-1{
            position: absolute;
            left: 100px;
            top: 200px;
            width: 200px;
            height: 100px;
            background-color: blue;
        }
        .div-2{
            position: relative;
            left: 10px;
            top: 20px;
            width: 50px;
            height: 50px;
            background-color: rgb(195, 235, 103);
        }
        .div-3{
            position: relative;
            left: 10px;
            top: 20px;
            width: 50px;
            height: 50px;
            background-color: rgb(85, 21, 189);
        }
        .div-4{
            position: relative;
            margin: 25%;
            padding-top: 5%;
            width: 45%;
            height: 20%;
            background-color: rgb(204, 40, 18);
        }
        

        
    </style>

</head>

<body>

    <div class="div-1">
        <div class="div-3"></div>
    </div>
    <div class="div-2">

    </div>
    <div class="div-1">
        <div class="div-4"></div>
    </div>

    

</body>

</html>
