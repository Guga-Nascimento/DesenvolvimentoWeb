<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Google</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        body{
            background-color: black;
            color: white;
        }
        .layout{
            margin: 50px;
            text-align: center;
            background-color: rgb(30,30,30);
            padding: 50px;
        }
        /*_________________________________________________*/
        .link{
            color: rgb(10,193,218);
            text-decoration: none;
        }
        .link:visited{
            color: rgb(255, 0, 0);
        }
        .link:hover{
            color: rgb(229, 255, 0)
        }
        .link:active{
            color: rgb(0, 102, 255);
        }
        h1{
          color: antiquewhite;  
        }
        h1::first-letter{
            font-size: 60px;
            color: rgb(165, 137, 231);
        }
        .layout2{
            margin: 50px;
            text-align: center;
            background-color: rgb(30,30,30);
            padding: 50px;
        }
        .link2{
            text-decoration: none;
            background-color: rgb(28,114,163);
            color: rgb(224, 224, 224);
            min-width: 200px;
            padding: 10px 30px;
            border-radius: 10px;
        }
        .link2:hover{
            background-color: rgb(65,114,163);
            color: rgb(255, 255, 255);

        }
        .correcaoParagrafo{
            padding: 20px;
            font-size: 20px;
        }

    </style>
</head>
<body>

    <div class="layout">
        <h1>Deseja visitar o site da Google? Clique no link seguinte:
            <a href="https://www.google.com" class="link" target="_blank"><u>Clique Aqui</u></a>
        </h1>
    </div>

    <div class="layout2">

        <p class="correcaoParagrafo">Olá Mundo!</p>
        <a href="https://www.google.com" class="link2" target="_blank">visitar Google</a>


    </div>
    

</body>
</html>
