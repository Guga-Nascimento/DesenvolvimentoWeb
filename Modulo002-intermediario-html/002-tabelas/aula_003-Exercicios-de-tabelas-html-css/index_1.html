<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabelas</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th,td{
            padding: 5px;
        }
        table{
            width: 50%;
        }
    </style>
</head>

<body>
    <table>
       
        <thead>
            <tr>
                <th colspan="2" style="background-color: aquamarine;">Célula única</th>
                <th colspan="2" style="background-color: aquamarine;">Célula única</th>

            </tr>
        </thead>

        <tbody>

            <tr>
                <td>Linha 1 A</td>
                <td>Linha 1 B</td>
                <td>Linha 1 C</td>
                <td>Linha 1 D</td>
            </tr>

            <tr>
                <td>Linha 2 A</td>
                <td>Linha 2 B</td>
                <td>Linha 2 C</td>
                <td>Linha 2 D</td>
            </tr>

        </tbody>

    </table>

</body>

</html>
