<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabelas</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 5px;
        }

        table {
            width: 50%;
        }
    </style>
</head>

<body>
    <table>

        <thead>
            <tr>
                <th style="background-color: rgb(158, 110, 37);">Linha 1 A</th>
                <th style="background-color: rgb(158, 110, 37);">Linha 1 B</th>
                <th style="background-color: rgb(158, 110, 37);">Linha 1 C</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td style="background-color: rgb(158, 110, 37);">Linha 1 A</td>
                <td colspan="2" style="background-color: aquamarine;">Célula única</td>
            </tr>
            <tr>
                <td style="background-color: rgb(158, 110, 37);">Linha 1 A</td>
                <td colspan="2" style="background-color: aquamarine;">Célula única</td>
            </tr>

            <tr>
                <td>Linha 2 A</td>
                <td>Linha 2 B</td>
                <td>Linha 2 C</td>

            </tr>

        </tbody>

    </table>

</body>

</html>
