<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabelas</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 5px;
        }

        table {
            width: 50%;
        }
    </style>
</head>

<body>
    <table>
        <tbody>
            <tr>
                <td colspan="2">CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
            </tr>
            <tr>
                <td rowspan="4">CÉLULA</td>
                <td rowspan="2">CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
            </tr>
            <tr>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
            </tr>
            <tr>
                <td rowspan="2">CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
            </tr>
            <tr>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
                <td>CÉLULA</td>
            </tr>
        </tbody>

    </table>

</body>

</html>
