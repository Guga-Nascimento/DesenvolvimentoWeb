<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f3c88;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-enviar:hover {
            background: #162d66;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Formulário</h2>

        <form action="https://sys4soft.com/udemy/forms/index.php" method="post">

            <div class="form-group checkbox-group">
                <label for="check_atualizar">
                    <input type="checkbox" name="check_atualizar" id="check_atualizar" value="atualizar" checked>
                    Atualizar os dados automaticamente
                </label>
            </div>

            <div class="form-group checkbox-group">
                <label for="check_salvar">
                    <input type="checkbox" name="check_salvar" id="check_salvar" value="salvar" checked>
                    Salvar toda a informação automaticamente
                </label>
            </div>

            <div class="form-group">
                <input class="btn-enviar" type="submit" value="Enviar">
            </div>

        </form>
    </div>

</body>

</html>
