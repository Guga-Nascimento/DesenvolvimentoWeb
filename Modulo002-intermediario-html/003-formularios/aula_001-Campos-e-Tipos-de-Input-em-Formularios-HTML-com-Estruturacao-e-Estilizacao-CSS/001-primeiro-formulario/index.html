<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .form-container {
            width: 60%;
            margin: auto;
        }

        .form-group {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h3>Formulário</h3>
    <div class="form-container">
        <form action="https://sys4soft.com/udemy/forms/index.php" method="post">

            <div class="form-group">
                <input type="text" name="campo_texto" minlength="5" maxlength="20" required
                    placeholder="Indica seu nome" value="Gustavo">
            </div>

            <div class="form-group">
                <input type="email" name="campo_email" multiple value="teste@teste.com">
            </div>

            <div class="form-group">
                <input type="password" name="campo_password" value="123456">
            </div>
            <div class="form-group">
                <input type="number" name="campo_numero" minlength="0" maxlength="10" step="0.01" value="1.5">
            </div>
            <div class="form-group">
                <input type="url" name="campo_url" value="https://">
            </div>

            <hr>

            <div class="form-group">
                <input type="date" name="campo_date" value="2008-02-11">
            </div>

            <div class="form-group">
                <input type="time" name="campo_hora">
            </div>

            <div class="form-group">
                <input type="submit" value="Enviar">
            </div>

        </form>
    </div>


</body>

</html>
