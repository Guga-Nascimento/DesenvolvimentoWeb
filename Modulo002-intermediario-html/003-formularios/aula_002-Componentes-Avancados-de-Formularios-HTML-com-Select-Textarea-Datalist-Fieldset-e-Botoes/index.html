<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Select</title>

    <!-- liga o HTML ao arquivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="form-container">
        <h3>Formulário</h3>

        <form action="https://sys4soft.com/udemy/forms/index.php" method="post">

            <div class="form-group">
                <label for="campo_selecao">Selecione uma opção:</label>

                <select name="campo_selecao" id="campo_selecao">
                    <option value="pt">Portugal</option>
                    <option value="br">Brasil</option>
                    <option value="ao">Angola</option>
                    <option value="mc">Moçambique</option>
                    <option value="cv">Cabo Verde</option>
                </select>
            </div>

            <div class="form-group">
                <input type="submit" value="Enviar">
            </div>

        </form>
    </div>

</body>

</html>
