<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Faz a página se adaptar corretamente à largura do dispositivo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Orientation Media Query</title>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da página */
        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
            padding: 20px;
        }

        /* Estilo base das mensagens */
        h3 {
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.12);
        }

        /* 
           Por padrão, mostramos o modo retrato.
           Isso vale enquanto a tela estiver em portrait.
        */
        .formato-p {
            display: block;
            background-color: #dbeafe;
            color: #1e3a8a;
        }

        /* Por padrão, o modo paisagem fica escondido */
        .formato-l {
            display: none;
            background-color: #dcfce7;
            color: #166534;
        }

        /* 
           Quando a orientação da tela for landscape:
           - escondemos o texto de portrait
           - mostramos o texto de landscape
        */
        @media (orientation: landscape) {
            .formato-p {
                display: none;
            }

            .formato-l {
                display: block;
            }
        }
    </style>
</head>
<body>
    
    <h3 class="formato-p">Estou em formato de retrato (portrait)</h3>
    <h3 class="formato-l">Estou em formato de paisagem (landscape)</h3>

</body>
</html>
