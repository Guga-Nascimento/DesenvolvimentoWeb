<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação Progressiva de Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <form action="#" method="post" name="formulario_login" class="formulario">
            <h1>Login</h1>
            <p class="descricao">
                Exercício de validação com mensagens de erro, destaque visual e feedback de sucesso.
            </p>

            <div class="campo">
                <label for="usuario">Usuário</label>
                <input type="text" name="usuario" id="usuario" placeholder="Digite seu usuário">
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
            </div>

            <input type="submit" value="Entrar" class="botao">

            <p class="mensagem-geral" id="mensagemGeral"></p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
