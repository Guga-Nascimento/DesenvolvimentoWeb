<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução aos Arrays</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            color: #1d4ed8;
            margin-bottom: 20px;
        }

        p {
            color: #374151;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .resultado {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-top: 20px;
        }

        .resultado h2 {
            margin-bottom: 10px;
            color: #0f172a;
            font-size: 1.1rem;
        }

        #saida {
            color: #111827;
            font-weight: bold;
            white-space: pre-line;
        }
    </style>

    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Introdução aos Arrays</h1>

        <p>
            Arrays servem para guardar vários valores dentro de uma única variável.
        </p>

        <p>
            Neste exemplo, vamos mostrar todos os nomes, acessar um item específico
            e alterar um valor do array.
        </p>

        <div class="botoes">
            <button id="btnMostrarTodos">Mostrar todos</button>
            <button id="btnMostrarSegundo">Mostrar segundo nome</button>
            <button id="btnAlterarNome">Alterar segundo nome</button>
        </div>

        <div class="resultado">
            <h2>Resultado:</h2>
            <p id="saida">Clique em um botão para testar.</p>
        </div>
    </div>
</body>
</html>
