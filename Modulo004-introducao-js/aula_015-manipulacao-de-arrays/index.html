<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação de Arrays</title>

    <link rel="stylesheet" href="estilo.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Manipulação de Arrays</h1>
        <p class="descricao">
            Clique nos botões para testar as principais operações com arrays em JavaScript.
        </p>

        <div class="painel">
            <h2>Array atual</h2>
            <p id="arrayAtual">["joao", "ana", "carlos"]</p>
        </div>

        <div class="botoes">
            <button id="btnMostrarTamanho">Mostrar tamanho</button>
            <button id="btnAdicionarFinal">Adicionar no final</button>
            <button id="btnAdicionarInicio">Adicionar no início</button>
            <button id="btnRemoverFinal">Remover do final</button>
            <button id="btnRemoverInicio">Remover do início</button>
            <button id="btnAlterarSegundo">Alterar segundo nome</button>
            <button id="btnUsarSplice">Usar splice</button>
            <button id="btnResetar">Resetar array</button>
        </div>

        <div class="painel resultado-box">
            <h2>Resultado</h2>
            <p id="resultado">Escolha uma operação para ver o resultado.</p>
        </div>
    </div>
</body>
</html>
