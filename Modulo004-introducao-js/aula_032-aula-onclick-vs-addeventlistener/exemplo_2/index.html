<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de addEventListener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header class="topo">
            <h1 id="titulo">Texto original</h1>
            <p class="subtitulo">
                Aula prática para mostrar que <code>addEventListener()</code>
                permite vários listeners no mesmo evento.
            </p>
        </header>

        <section class="card">
            <h2>Controles</h2>
            <div class="botoes">
                <button id="botao">Alterar texto</button>
                <button id="resetar">Resetar</button>
            </div>
        </section>

        <section class="card">
            <h2>Explicação na tela</h2>
            <div id="saida" class="saida">
                Clique no botão para ver o que acontece.
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
