<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paleta RGB com forEach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="topo">
      <h1>Paleta RGB com forEach</h1>
      <p>
        Clique em uma cor para gerar 25 caixas com variação RGB de 0 até 250, de 10 em 10.
      </p>
    </header>

    <section class="painel-botoes">
      <button id="btn_vermelho" class="botao vermelho">Vermelho</button>
      <button id="btn_verde" class="botao verde">Verde</button>
      <button id="btn_azul" class="botao azul">Azul</button>
    </section>

    <section class="painel-info">
      <h2 id="titulo-cor">Nenhuma cor selecionada</h2>
      <p id="mensagem">Escolha um botão para gerar a paleta.</p>
    </section>

    <section id="area-caixas" class="area-caixas"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
